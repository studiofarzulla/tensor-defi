---
title: "Tensor Decomposition for Cryptocurrency Market Microstructure: Beyond Matrix Methods"
author:
  - Murad Farzulla (Farzulla Research, ORCID 0009-0002-7164-8704)
date: November 2025
license: CC BY 4.0
bibliography: references.bib
abstract: |
  **Methods:** We propose a tensor decomposition framework for cryptocurrency market microstructure using CP (CANDECOMP/PARAFAC) and Tucker decomposition. Using one year of hourly OHLCV data (8,761 hours) for BTC, ETH, and SOL from Binance, we construct a 4-dimensional tensor (time × venue × asset × feature) and compare tensor methods against PCA baselines.

  **Results:** Tensor decomposition reveals remarkable low-dimensional structure: rank-4 CP and Tucker decompositions achieve 96.55% and 96.56% explained variance respectively, vastly outperforming traditional PCA (92.31%). The negligible difference between CP and Tucker (0.01%) confirms true rank-4 structure with no higher-order interactions. Four latent factors admit clear economic interpretation: (1) Bitcoin dominance and market sentiment, (2) altcoin risk and ETH-SOL correlation, (3) volatility regimes and liquidity shocks, (4) intraday microstructure and mean reversion.

  **Implications:** Our findings validate that cryptocurrency markets evolve on curved, low-dimensional manifolds induced by microstructure dynamics. Tensor methods capture multiplicative interactions between time, venue, asset, and feature dimensions that matrix methods destroy through flattening. This work addresses the research gap identified by Almeida et al. (2024): no prior studies apply high-dimensional joint modeling across cryptocurrency exchanges. Applications include regime detection, multi-asset portfolio construction, cross-venue arbitrage, and risk management.
keywords:
